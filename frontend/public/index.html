<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>InsightFlow | Corporate Feedback</title>

    <!-- Google Fonts - All fonts used across the project -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Public+Sans:wght@300;400;500;600;700;900&display=swap"
      rel="stylesheet"
    />

    <!-- Google Material Symbols (Icons) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />

    <!-- Tailwind CSS CDN (same as original) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- ApexCharts CDN (for Dashboard charts) -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <!-- Flatpickr CSS (for date picker) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <!-- Leaflet CSS (for maps in Critical Issues) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      /* ─── TAILWIND CONFIG ─── same config used in all original HTML files ─── */
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#15803d',
              accent: '#10b981',
              'background-light': '#f0fdf4',
              'background-dark': '#dcfce7',
              'text-main': '#0f291b',
              'text-soft': '#4b6b58',
              cloud: '#f4fbf7',
              dancer: '#d1e7dd',
              slate_accent: '#16a34a',
              dark_slate: '#14532d',
            },
            fontFamily: {
              display: ['Space Grotesk', 'sans-serif'],
              body: ['Manrope', 'sans-serif'],
              manrope: ['Manrope', 'sans-serif'],
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
              card: '28px',
            },
            animation: {
              float: 'float 8s ease-in-out infinite',
              'pulse-slow': 'pulse 10s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'grid-move': 'grid-move 30s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0px) scale(1)' },
                '50%': { transform: 'translateY(-30px) scale(1.05)' },
              },
              'grid-move': {
                '0%': { transform: 'translateY(0)' },
                '100%': { transform: 'translateY(-50%)' },
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="font-manrope" style="color: #374151;">
    <div id="root"></div>
  </body>
</html>
